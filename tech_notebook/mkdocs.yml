theme:
  name: material # readthedocs
  language: tr
  features:
    - navigation.tabs                            # Sekmeleri topa yerleştir         
    - navigation.tabs.sticky                     # Sekmeleri kaydırma sırasında sabitle
    - navigation.sections                        # Bölümler halinde gezinme    
    - navigation.top                             # "Sayfanın en üstüne git" düğmesi ekle          
    - navigation.footer                          # Altbilgi navigasyonu ekle  (Önceki | Sonraki)
    - navigation.tracking                        # Google Analytics izleme kodu ekle
    - navigation.instant                         # Sayfa geçişlerini hızlandırmak için anında yükleme
    - navigation.instant.prefetch                # Bağlantıları önceden yükle
    - navigation.instant.progress                # Yükleme ilerleme çubuğu göster
    - navigation.prune                           # Boş bölümleri gizle
    - navigation.indexes                         # Arama sonuçlarında dizin sayfalarını göster
    # - navigation.instant.feedback               # Bölümleri genişletilmiş olarak başlat  
    - content.code.copy                          # Kod kopyalama düğmesi ekle  
    - content.code.annotate                      # Kod açıklamaları ekle
    - content.tabs.linked                        # İçerik sekmelerini URL ile bağla
    - content.code.select                        # Kod seçimi için eylemler ekle
    - content.code.wrap                          # Uzun kod satırlarını sar
    # - content.tooltips                          # Araç ipuçları ekle
    # - content.action.edit                       # Sayfa düzenleme bağlantısı ekle
    # - content.action.view                       # Sayfayı GitHub'da görüntüleme bağlantısı ekle
    - search.suggest                             # Arama önerileri ekle
    - search.highlight                           # Arama sonuçlarında vurgulama ekle
    # - toc.integrate                             # İçindekiler tablosunu içeriğe entegre et
    - header.autohide
    - announce.dismiss
    

  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4

  font:
    text: Roboto
    code: Fira Code

  icon:
    repo: fontawesome/brands/github
    logo: material/robot-industrial

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tasklist:
      custom_checkbox: true # [ ] / [x] checklist
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg  

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/extra.js